name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Force Environment Creation
        run: |
          # 1. Create a full package.json so the system knows this is a real app
          echo '{"name": "g-fantasy", "version": "1.0.0", "dependencies": {"@capacitor/android": "5.7.0", "@capacitor/cli": "5.7.0", "@capacitor/core": "5.7.0"}}' > package.json
          
          # 2. Create the capacitor config with the webDir set to the current folder
          echo '{"appId": "com.gfantasy.app", "appName": "G-Fantasy", "webDir": ".", "server": {"androidScheme": "https"}}' > capacitor.config.json
          
          # 3. Clean install
          npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android Project
        run: |
          # The key fix: We use 'npx cap add android' with a force flag if needed
          # and ensure the environment is ready for native code
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Final APK Compilation
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: G-Fantasy-Titan-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
