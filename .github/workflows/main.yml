name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create System Configs
        run: |
          # 1. Create a proper package.json first
          echo '{"name": "g-fantasy", "version": "1.0.0", "dependencies": {"@capacitor/android": "^5.0.0", "@capacitor/cli": "^5.0.0", "@capacitor/core": "^5.0.0"}}' > package.json
          
          # 2. Install the tools
          npm install
          
          # 3. Create the Capacitor config file manually to avoid prompts
          echo '{"appId": "com.gfantasy.app", "appName": "G-Fantasy", "webDir": ".", "bundledWebRuntime": false}' > capacitor.config.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Build Android Folder
        run: |
          # Delete any old attempts
          rm -rf android
          # Build it from scratch
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Execute Titan Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: G-Fantasy-Titan-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
