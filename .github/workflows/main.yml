name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Create a dummy package.json if it doesn't exist to prevent errors
          npx cap init "G-Fantasy" "com.gfantasy.app" --web-dir .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Add Android Platform
        run: |
          # We force the sync to ensure the web assets (index.html) are recognized
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GFantasy-Release-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
