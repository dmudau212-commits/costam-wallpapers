name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Initialize Environment
        run: |
          # Create package.json and install only what we need
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Initialize capacitor with a clean slate
          npx cap init "G-Fantasy" "com.gfantasy.app" --web-dir .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Add & Sync Android
        run: |
          # If the folder exists, we clear it to avoid "Add Android Platform" errors
          rm -rf android
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GFantasy-Titan-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
