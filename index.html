<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>G-Fantasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #FF99CC; 
            --sub-accent: #66CCFF; 
            --bg: #121212; /* Default Dark Mode */
            --text: #ffffff; 
            --card-bg: #1e1e1e; 
            --nav-bg: #181818;
            --nav-text: #9aa0a6;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: 'Roboto', sans-serif; overflow: hidden;
            transition: background 0.4s ease; /* Makes background changes smooth */
        }
        
        /* G-LOGO LOADING SCREEN */
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .large-g { 
            font-size: 150px; font-weight: 700;
            background: linear-gradient(180deg, #FF99CC 0%, #66CCFF 50%, #FF99CC 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* SEARCH AREA */
        header { padding: 50px 16px 10px; }
        .search-pill {
            background: var(--card-bg); border-radius: 28px; padding: 12px 18px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-input {
            background: none; border: none; color: #fff; font-size: 16px; width: 100%; outline: none; margin-left: 10px;
        }

        /* PAGE ENGINE & SMOOTH TRANSITIONS */
        .page { 
            height: calc(100% - 145px); overflow-y: auto; 
            padding: 0 16px 80px;
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: none;
        }
        .page.active { 
            display: block; opacity: 1; transform: translateY(0);
        }

        .section-title { font-size: 20px; font-weight: 500; margin: 25px 0 15px; }
        
        /* GRID LAYOUT */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; filter: brightness(0.8); }
        .card-info { padding: 12px; font-size: 11px; text-align: center; letter-spacing: 1px; color: var(--accent); font-weight: bold; }

        /* SETTINGS: THE COLOR ENGINE */
        .color-row { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .dot { 
            width: 50px; height: 50px; border-radius: 50%; 
            border: 3px solid rgba(255,255,255,0.2); cursor: pointer;
            transition: transform 0.2s;
        }
        .dot:active { transform: scale(1.2); }

        /* BOTTOM NAV */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--nav-bg); border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-link { 
            text-align: center; font-size: 12px; color: var(--nav-text); 
            text-decoration: none; display: flex; flex-direction: column; align-items: center;
            transition: color 0.3s;
        }
        .nav-link.active { color: var(--accent); }
        
        .profile-icon {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
            border: 2px solid var(--nav-text);
        }
        .nav-link.active .profile-icon { border-color: var(--accent); }
        .profile-icon svg { width: 16px; height: 16px; fill: var(--nav-text); }
        .nav-link.active .profile-icon svg { fill: var(--accent); }
    </style>
</head>
<body>

    <div id="loader"><div class="large-g">G</div></div>

    <header>
        <div class="search-pill">
            <span>🔍</span>
            <input type="text" class="search-input" placeholder="Search the unknown...">
        </div>
    </header>

    <div id="home" class="page active">
        <div class="section-title">Fantasy awaits you</div>
        <div class="grid">
            <div class="card" onclick="questAlert()">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnVsdjYycTF0MnExNWh3OGRxYm14dXlyMWp5Z2R4Mzl5c3dqMGRoOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/WwK5pDffQ6l6vD8n1h/giphy.gif">
                <div class="card-info">SYNC QUEST</div>
            </div>
            <div class="card" onclick="questAlert()">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjRreHByZ3A4bXF6ZXZqNnV4eHd4eHd4eHd4eHd4eHd4eHd4eHd4eHd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxx8y16D59S/giphy.gif">
                <div class="card-info">SYNC QUEST</div>
            </div>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="section-title">App Appearance</div>
        <p style="font-size: 14px; color: var(--nav-text);">Select a background color:</p>
        <div class="color-row">
            <div class="dot" style="background:#FF99CC" onclick="changeAppColor('#FF99CC', '#fff')"></div>
            <div class="dot" style="background:#66CCFF" onclick="changeAppColor('#66CCFF', '#fff')"></div>
            <div class="dot" style="background:#121212" onclick="changeAppColor('#121212', '#fff')"></div>
            <div class="dot" style="background:#ffffff" onclick="changeAppColor('#ffffff', '#202124')"></div>
            <div class="dot" style="background:#2D0E44" onclick="changeAppColor('#2D0E44', '#fff')"></div>
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="nav('home', this)">
            <div class="profile-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            You
        </div>
        <div class="nav-link" onclick="questAlert()">
            <span style="font-size:24px">📱</span>Apps
        </div>
        <div class="nav-link" onclick="nav('settings', this)">
            <span style="font-size:24px">⚙️</span>Settings
        </div>
    </nav>

    <script>
        function nav(id, el) {
            const pages = document.querySelectorAll('.page');
            const links = document.querySelectorAll('.nav-link');
            
            pages.forEach(p => p.classList.remove('active'));
            links.forEach(l => l.classList.remove('active'));
            
            setTimeout(() => {
                document.getElementById(id).classList.add('active');
                el.classList.add('active');
            }, 50);
        }

        function changeAppColor(bgColor, textColor) {
            document.documentElement.style.setProperty('--bg', bgColor);
            document.documentElement.style.setProperty('--text', textColor);
            // Auto-adjust cards and nav for visibility
            if(bgColor === '#ffffff') {
                document.documentElement.style.setProperty('--card-bg', '#f1f3f4');
                document.documentElement.style.setProperty('--nav-bg', '#ffffff');
                document.documentElement.style.setProperty('--nav-text', '#5f6368');
            } else {
                document.documentElement.style.setProperty('--card-bg', 'rgba(255,255,255,0.05)');
                document.documentElement.style.setProperty('--nav-bg', 'rgba(0,0,0,0.2)');
                document.documentElement.style.setProperty('--nav-text', '#9aa0a6');
            }
        }
        
        function questAlert() {
            alert("Quest Sync in Progress...");
        }

        window.onload = () => {
            setTimeout(() => { 
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1500);
        };
    </script>
</body>
</html>
