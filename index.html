<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Costam Wallz</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: -apple-system, sans-serif; overflow: hidden;
        }

        /* 1. LOADING SCREEN */
        #loader {
            position: fixed; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 999;
            transition: opacity 1s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333; border-top: 5px solid #ff00cc;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. MAIN LAYOUT */
        #app-content {
            display: none; padding: 20px; text-align: center;
            height: 100vh; flex-direction: column; align-items: center; justify-content: center;
        }
        .icon-box {
            width: 100px; height: 100px; 
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border-radius: 22px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255, 0, 204, 0.4);
        }
        h1 { font-size: 26px; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }

        /* 3. SYNC / UPLOAD BUTTON */
        .upload-btn {
            background: #fff; color: #000; padding: 15px 40px;
            border-radius: 30px; font-weight: bold; text-decoration: none;
            display: inline-block; cursor: pointer; border: none; font-size: 16px;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h2 style="margin-top: 20px; letter-spacing: 2px;">WELCOME</h2>
    </div>

    <div id="app-content" style="display: none;">
        <div class="icon-box"></div>
        <h1>Costam Wallz</h1>
        <p>Sync your favorites to the cloud</p>

        <label for="file-upload" class="upload-btn">
            Upload Picture / Video
        </label>
        <input type="file" id="file-upload" accept="image/*,video/*" onchange="handleSync(this)">
        
        <p id="status" style="margin-top: 20px; color: #ff00cc;"></p>
    </div>

    <script>
        // HANDLE LOADING & GREETING
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('app-content').style.display = 'flex';
                    
                    // ONCE-ONLY GREETING
                    if (!localStorage.getItem('seenUnicorn')) {
                        alert("Hi!!! Unicorn");
                        localStorage.setItem('seenUnicorn', 'true');
                    }
                }, 1000);
            }, 2500); // Shows "Welcome" for 2.5 seconds
        };

        // HANDLE SYNC / UPLOAD
        function handleSync(input) {
            if (input.files && input.files[0]) {
                const fileName = input.files[0].name;
                const confirmSync = confirm("Do you want to sync '" + fileName + "' to your phone?");
                
                if (confirmSync) {
                    document.getElementById('status').innerText = "Syncing with cloud...";
                    setTimeout(() => {
                        alert("Success! " + fileName + " has been synced.");
                        document.getElementById('status').innerText = "Last sync: Just now";
                    }, 2000);
                }
            }
        }
    </script>
</body>
</html>
