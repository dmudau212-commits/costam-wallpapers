<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Costam Wallz</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden;
        }

        /* 1. LOADING SCREEN */
        #loader {
            position: fixed; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 999;
            transition: opacity 1s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333; border-top: 5px solid #ff00cc;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. MAIN LAYOUT */
        #app-content {
            display: none; padding: 20px; text-align: center;
            height: 100vh; flex-direction: column; align-items: center; justify-content: center;
        }
        .icon-box {
            width: 110px; height: 110px; 
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            border-radius: 24px; margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(255, 0, 204, 0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 45px;
        }
        h1 { font-size: 28px; margin: 0; font-weight: 700; }
        p { color: #888; font-size: 15px; margin: 10px 0 35px; }

        /* 3. BUTTONS */
        .upload-btn {
            background: #fff; color: #000; padding: 16px 45px;
            border-radius: 35px; font-weight: bold; text-decoration: none;
            display: inline-block; cursor: pointer; border: none; font-size: 17px;
            transition: transform 0.2s;
        }
        .upload-btn:active { transform: scale(0.95); }
        
        .request-link {
            margin-top: 30px; color: #ff00cc;
            text-decoration: none; font-size: 14px; font-weight: 500;
        }
        
        input[type="file"] { display: none; }
        #status { margin-top: 25px; color: #ff00cc; font-size: 14px; font-weight: 500; min-height: 20px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h2 style="margin-top: 20px; letter-spacing: 3px; font-size: 14px; color: #888;">WELCOME</h2>
    </div>

    <div id="app-content">
        <div class="icon-box">✨</div>
        <h1>Costam Wallz</h1>
        <p>Exclusive for Unicorn</p>

        <label for="file-upload" class="upload-btn">
            Upload to Sync
        </label>
        <input type="file" id="file-upload" accept="image/*,video/*" onchange="startSyncProcess(this)">
        
        <p id="status"></p>

        <a href="https://wa.me/YOUR_NUMBER?text=Hey%20Bro!%20I%20want%20a%20new%20live%20wallpaper!" class="request-link">
            ✨ Request Live Wallpaper
        </a>
    </div>

    <script>
        // HANDLE LOADING SCREEN & GREETING
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('app-content').style.display = 'flex';
                    
                    // ONCE-ONLY SURPRISE GREETING
                    if (!localStorage.getItem('seenUnicorn')) {
                        alert("Hi!!! Unicorn");
                        localStorage.setItem('seenUnicorn', 'true');
                    }
                }, 1000);
            }, 2500);
        };

        // THE "SYNC" ENGINE
        function startSyncProcess(input) {
            if (input.files && input.files[0]) {
                const fileName = input.files[0].name;
                
                // Asking for placement preference
                const choice = prompt("Where do you want to apply this?\n1. Home Screen\n2. Lock Screen\n3. Both");

                if (choice === "1" || choice === "2" || choice === "3") {
                    const statusText = document.getElementById('status');
                    statusText.innerText = "Processing image...";
                    
                    setTimeout(() => {
                        statusText.innerText = "Applying security layers...";
                        
                        setTimeout(() => {
                            statusText.innerText = "Syncing to iOS System...";
                            
                            setTimeout(() => {
                                alert("✅ SYNC SUCCESSFUL!\n\nFinal Step: Due to iPhone security, please save the image to your Photos and set it manually in Settings.");
                                statusText.innerText = "Last sync: " + fileName;
                            }, 2000);
                        }, 2000);
                    }, 1500);
                } else {
                    alert("Sync cancelled. Please enter 1, 2, or 3.");
                }
            }
        }
    </script>
</body>
</html>
