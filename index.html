<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pixel Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root { --main-color: #44cf40; --bg-color: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        
        /* 1. LOADING SCREEN */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        /* 2. TOP NAV (Play Store Style) */
        header { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 40px 15px 15px; background: #111; border-bottom: 1px solid #333;
        }
        .search-container {
            background: #222; border-radius: 8px; padding: 8px 12px;
            display: flex; align-items: center; width: 80%;
        }
        .search-input {
            background: none; border: none; color: #fff; font-family: 'Press Start 2P';
            font-size: 8px; width: 100%; outline: none;
        }
        .menu-dots { font-size: 20px; color: #999; cursor: pointer; padding-left: 10px; }

        /* 3. SIDE MENU (Files & Downloads) */
        #side-menu {
            position: fixed; top: 0; right: -100%; width: 70%; height: 100%;
            background: #111; border-left: 2px solid var(--main-color); z-index: 9000;
            transition: 0.4s; padding: 60px 20px;
        }
        .menu-item { padding: 20px 0; border-bottom: 1px solid #222; font-size: 10px; color: var(--main-color); cursor: pointer; }

        /* 4. MAIN CONTENT AREA */
        .page-container { height: calc(100% - 130px); overflow-y: scroll; padding-bottom: 80px; display: none; }
        .active-page { display: block; }

        /* 5. SETTINGS & KEYBOARD THEME */
        .settings-box { padding: 20px; text-align: center; }
        .color-picker { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .color-circle { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }

        /* 6. BOTTOM NAV (Play Store Style) */
        nav.bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #111; border-top: 1px solid #333;
            display: flex; justify-content: space-around; align-items: center; z-index: 8000;
        }
        .nav-item { text-align: center; font-size: 7px; color: #999; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--main-color); }
        .nav-item span { display: block; font-size: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="font-size: 14px;">Hi!!! Unicorn 🦄</h1>
        <p style="font-size: 8px; color: var(--main-color); margin-top: 20px;">READY TO SYNC...</p>
    </div>

    <div id="side-menu">
        <div class="menu-item" onclick="toggleMenu()">✖ CLOSE</div>
        <div class="menu-item">📁 FILES</div>
        <div class="menu-item">📥 DOWNLOADS</div>
    </div>

    <header>
        <div class="search-container">
            <input type="text" id="app-search" class="search-input" placeholder="Search apps & games">
        </div>
        <div class="menu-dots" onclick="toggleMenu()">⋮</div>
    </header>

    <div id="home" class="page-container active-page">
        <div style="padding: 20px; text-align: center; color: var(--main-color);">NEW QUESTS FOR YOU</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px;">
             <div style="background:#222; height: 150px; border-radius: 10px;"></div>
             <div style="background:#222; height: 150px; border-radius: 10px;"></div>
        </div>
    </div>

    <div id="settings" class="page-container">
        <div class="settings-box">
            <h3>SETTINGS</h3>
            <p style="font-size: 8px; margin-top: 20px;">KEYBOARD THEME COLOR</p>
            <div class="color-picker">
                <div class="color-circle" style="background: #44cf40;" onclick="changeTheme('#44cf40')"></div>
                <div class="color-circle" style="background: #ff00ff;" onclick="changeTheme('#ff00ff')"></div>
                <div class="color-circle" style="background: #00ffff;" onclick="changeTheme('#00ffff')"></div>
                <div class="color-circle" style="background: #ffff00;" onclick="changeTheme('#ffff00')"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item active" onclick="showPage('home', this)"><span>🏠</span>Home</div>
        <div class="nav-item"><span>🖼️</span>Wallpapers</div>
        <div class="nav-item"><span>✨</span>Stickers</div>
        <div class="nav-item" onclick="showPage('settings', this)"><span>⚙️</span>Settings</div>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.style.right = menu.style.right === '0px' ? '-100%' : '0px';
        }

        function showPage(pageId, element) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            element.classList.add('active');
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--main-color', color);
            document.getElementById('app-search').style.border = `1px solid ${color}`;
            alert("Theme Updated!");
        }

        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
            }, 2500);
        };
    </script>
</body>
</html>
