<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>G-Fantasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #FF99CC; 
            --bg: #000000; 
            --text: #ffffff; 
            --card-bg: rgba(255, 255, 255, 0.08); 
            --nav-bg: rgba(15, 15, 15, 0.9);
            --transition-speed: 0.4s;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: 'Roboto', sans-serif; overflow: hidden;
            transition: background var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 1. ANIMATED G-LOGO LOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        .large-g { 
            font-size: 160px; font-weight: 700;
            background: linear-gradient(180deg, #FF99CC 0%, #66CCFF 50%, #FFFFFF 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,153,204,0.3));
        }

        /* 2. MODERN HEADER */
        header { padding: 55px 20px 15px; position: sticky; top: 0; z-index: 100; }
        .search-pill {
            background: var(--card-bg); border-radius: 30px; padding: 14px 20px;
            display: flex; align-items: center; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-input {
            background: none; border: none; color: #fff; font-size: 16px; width: 100%; outline: none; margin-left: 12px;
        }

        /* 3. SMOOTH PAGE ENGINE */
        .page { 
            height: calc(100% - 150px); overflow-y: auto; 
            padding: 10px 20px 100px;
            opacity: 0; transform: scale(0.98);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
        }
        .page.active { 
            display: block; opacity: 1; transform: scale(1);
        }

        .section-title { font-size: 24px; font-weight: 500; margin: 20px 0; letter-spacing: -0.5px; }
        
        /* 4. CARDS & GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            transition: transform 0.3s; position: relative;
        }
        .card:active { transform: scale(0.96); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-info { padding: 15px; font-size: 11px; text-align: center; font-weight: bold; color: var(--accent); }

        /* 5. PRO SETTINGS UI */
        .settings-item {
            background: var(--card-bg); padding: 18px; border-radius: 15px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .settings-label { font-size: 14px; font-weight: 500; }
        .settings-sub { font-size: 11px; color: #999; margin-top: 4px; }

        /* COLOR GRID (Every color in the book) */
        .color-book {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 15px;
        }
        .dot { 
            aspect-ratio: 1; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); 
            cursor: pointer; transition: transform 0.2s;
        }
        .dot:active { transform: scale(1.3); }

        /* 6. BOTTOM NAVIGATION (Glassmorphism) */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-link { 
            text-align: center; font-size: 12px; color: #9aa0a6; 
            text-decoration: none; display: flex; flex-direction: column; align-items: center;
        }
        .nav-link.active { color: var(--accent); }
        
        .profile-icon {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 5px;
            border: 2px solid #9aa0a6; transition: border-color 0.3s;
        }
        .nav-link.active .profile-icon { border-color: var(--accent); }
        .profile-icon svg { width: 18px; height: 18px; fill: #9aa0a6; }
        .nav-link.active .profile-icon svg { fill: var(--accent); }
    </style>
</head>
<body>

    <div id="loader"><div class="large-g">G</div></div>

    <header>
        <div class="search-pill">
            <span>🔍</span>
            <input type="text" class="search-input" placeholder="Fantasy awaits you...">
        </div>
    </header>

    <div id="home" class="page active">
        <div class="section-title">Fantasy awaits you</div>
        <div class="grid">
            <div class="card" onclick="vibrate()"><img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnVsdjYycTF0MnExNWh3OGRxYm14dXlyMWp5Z2R4Mzl5c3dqMGRoOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/WwK5pDffQ6l6vD8n1h/giphy.gif"><div class="card-info">SYNC QUEST</div></div>
            <div class="card" onclick="vibrate()"><img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjRreHByZ3A4bXF6ZXZqNnV4eHd4eHd4eHd4eHd4eHd4eHd4eHd4eHd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxx8y16D59S/giphy.gif"><div class="card-info">SYNC QUEST</div></div>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="section-title">System Settings</div>
        
        <div class="settings-label">App Appearance</div>
        <div class="color-book">
            <div class="dot" style="background:#FF99CC" onclick="applyTheme('#FF99CC', '#1a000d')"></div>
            <div class="dot" style="background:#66CCFF" onclick="applyTheme('#66CCFF', '#000d1a')"></div>
            <div class="dot" style="background:#34A853" onclick="applyTheme('#34A853', '#001a05')"></div>
            <div class="dot" style="background:#EA4335" onclick="applyTheme('#EA4335', '#1a0000')"></div>
            <div class="dot" style="background:#FBBC05" onclick="applyTheme('#FBBC05', '#1a1400')"></div>
            <div class="dot" style="background:#000000" onclick="applyTheme('#ffffff', '#000000')"></div>
            <div class="dot" style="background:#ffffff" onclick="applyTheme('#4285F4', '#ffffff')"></div>
            <div class="dot" style="background:#2D0E44" onclick="applyTheme('#FF99CC', '#2D0E44')"></div>
            <div class="dot" style="background:#FF5722" onclick="applyTheme('#FF5722', '#1a0500')"></div>
            <div class="dot" style="background:#9C27B0" onclick="applyTheme('#E1BEE7', '#4A148C')"></div>
        </div>

        <div style="margin-top: 30px;"></div>

        <div class="settings-item">
            <div>
                <div class="settings-label">Safe Sync</div>
                <div class="settings-sub">Scan wallpapers for viruses</div>
            </div>
            <input type="checkbox" checked>
        </div>

        <div class="settings-item" onclick="alert('Cache Cleared: 0B')">
            <div>
                <div class="settings-label">Clear Cache</div>
                <div class="settings-sub">Free up space on your device</div>
            </div>
            <span>🧹</span>
        </div>

        <div class="settings-item">
            <div>
                <div class="settings-label">Animation Speed</div>
                <div class="settings-sub">Set to "Fantasy Mode" (Fast)</div>
            </div>
            <span>⚡</span>
        </div>

        <div class="settings-item" onclick="alert('G-Fantasy v2.4.1 (Stable)')">
            <div>
                <div class="settings-label">Build Version</div>
                <div class="settings-sub">Tap for updates</div>
            </div>
            <span>v2.4.1</span>
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="nav('home', this)">
            <div class="profile-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            You
        </div>
        <div class="nav-link" onclick="alert('Searching for compatible Apps...')">
            <span style="font-size:24px">📱</span>Apps
        </div>
        <div class="nav-link" onclick="nav('settings', this)">
            <span style="font-size:24px">⚙️</span>Settings
        </div>
    </nav>

    <script>
        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function applyTheme(accent, bg) {
            document.documentElement.style.setProperty('--accent', accent);
            document.documentElement.style.setProperty('--bg', bg);
            
            // Adjust text color based on background brightness
            if(bg === '#ffffff') {
                document.documentElement.style.setProperty('--text', '#202124');
                document.documentElement.style.setProperty('--card-bg', '#f1f3f4');
                document.documentElement.style.setProperty('--nav-bg', 'rgba(255,255,255,0.8)');
            } else {
                document.documentElement.style.setProperty('--text', '#ffffff');
                document.documentElement.style.setProperty('--card-bg', 'rgba(255,255,255,0.08)');
                document.documentElement.style.setProperty('--nav-bg', 'rgba(15,15,15,0.9)');
            }
        }

        function vibrate() {
            if (window.navigator.vibrate) window.navigator.vibrate(20);
            alert("Fantasy Quest Synced!");
        }

        window.onload = () => {
            setTimeout(() => { 
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
            }, 1800);
        };
    </script>
</body>
</html>
