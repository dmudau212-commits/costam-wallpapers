<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Costam Wallz | Secure</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* ACCESS SCREEN */
        #gatekeeper {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; width: 220px; text-align: center; font-size: 20px; margin-bottom: 20px; outline: none; }
        .enter-btn { background: #fff; color: #000; padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* APP CONTENT */
        #app-content { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .icon-box { width: 120px; height: 120px; background: linear-gradient(135deg, #ff00cc, #3333ff); border-radius: 28px; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(255, 0, 204, 0.4); display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .sync-btn { background: #fff; color: #000; padding: 18px 50px; border-radius: 40px; font-weight: bold; text-decoration: none; font-size: 18px; }
        #status { color: #ff00cc; margin-top: 30px; font-size: 14px; font-weight: 500; height: 20px; }
        .tip { font-size: 11px; color: #444; margin-top: 40px; padding: 0 40px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div style="font-size: 50px; margin-bottom: 20px;">🛡️</div>
        <h2 style="letter-spacing: 3px; font-size: 12px; color: #666; margin-bottom: 20px;">SECURE ACCESS</h2>
        <input type="password" id="access-code" placeholder="ENTER CODE">
        <div class="enter-btn" onclick="unlock()">UNLOCK</div>
    </div>

    <div id="app-content">
        <div class="icon-box">✨</div>
        <h1>Costam Wallz</h1>
        <p>Exclusive for Unicorn</p>
        <label for="file-upload" class="sync-btn">Sync Wallpaper</label>
        <input type="file" id="file-upload" style="display:none" onchange="runSync()">
        <p id="status"></p>
        <div class="tip"><b>TO DOWNLOAD:</b> Tap 'Share' in Safari and select 'Add to Home Screen'</div>
    </div>

    <script>
        const CODE = "1234"; // You can change this code!

        function unlock() {
            if (document.getElementById('access-code').value === CODE) {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                if (!localStorage.getItem('hi')) {
                    alert("Hi!!! Unicorn");
                    localStorage.setItem('hi', 'true');
                }
            } else { alert("Access Denied."); }
        }

        function runSync() {
            const s = document.getElementById('status');
            s.innerText = "Accessing iOS Library...";
            setTimeout(() => { s.innerText = "Syncing with Cloud..."; 
                setTimeout(() => { 
                    alert("✅ SUCCESS!\nSave to Photos to set wallpaper.");
                    s.innerText = "Status: Online";
                }, 2000);
            }, 2000);
        }
    </script>
</body>
</html>
