<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pixel Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        
        /* 1. LOADING SCREEN */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .unicorn-logo { font-size: 50px; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* 2. TOP NAV (Search & Dots) */
        header { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 40px 15px 15px; background: #1a2e1a; border-bottom: 2px solid #44cf40;
        }
        .search-box {
            background: #111; border: 1px solid #44cf40; padding: 8px;
            color: #44cf40; font-family: 'Press Start 2P'; font-size: 8px; width: 60%;
        }
        .menu-dots { font-size: 20px; cursor: pointer; color: #44cf40; }

        /* 3. SIDE MENU */
        #side-menu {
            position: fixed; top: 0; left: -100%; width: 70%; height: 100%;
            background: #111; border-right: 3px solid #44cf40; z-index: 9000;
            transition: 0.3s; padding: 50px 20px;
        }
        .menu-item { padding: 15px 0; border-bottom: 1px solid #333; font-size: 10px; color: #44cf40; list-style: none; }

        /* 4. BOTTOM NAV */
        nav.bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #111; border-top: 2px solid #44cf40;
            display: flex; justify-content: space-around; align-items: center; z-index: 8000;
        }
        .nav-item { text-align: center; font-size: 7px; color: #fff; text-decoration: none; }
        .nav-item span { display: block; font-size: 18px; margin-bottom: 5px; }

        /* GALLERY (Scrollable area) */
        .content { height: calc(100% - 130px); overflow-y: scroll; padding-bottom: 80px; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .wallpaper-card { background: #111; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        .wallpaper-card img { width: 100%; display: block; }
        .action-btn { background: #44cf40; color: #000; padding: 10px; font-size: 8px; border: none; width: 100%; font-family: 'Press Start 2P'; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="unicorn-logo">🦄</div>
        <h1 id="loading-text" style="font-size: 14px;">Hi!!! Unicorn</h1>
        <p style="font-size: 8px; color: #44cf40; margin-top: 20px;">LOADING VAULT...</p>
    </div>

    <div id="side-menu">
        <div class="menu-item" onclick="toggleMenu()">✖ CLOSE</div>
        <div class="menu-item">📁 FILES</div>
        <div class="menu-item">📥 DOWNLOADS</div>
        <div class="menu-item">⚙ SETTINGS</div>
    </div>

    <header>
        <input type="text" class="search-box" placeholder="SEARCH...">
        <div class="menu-dots" onclick="toggleMenu()">⋮</div>
    </header>

    <div class="content">
        <div class="gallery">
            <div class="wallpaper-card">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjRreHByZ3A4bXF6ZXZqNnV4eHd4eHd4eHd4eHd4eHd4eHd4eHd4eHd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZW5kZXImY3Q9Zw/3o7TKMGpxx8y16D59S/giphy.gif">
                <button class="action-btn">SYNC</button>
            </div>
            <div class="wallpaper-card">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnVsdjYycTF0MnExNWh3OGRxYm14dXlyMWp5Z2R4Mzl5c3dqMGRoOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/WwK5pDffQ6l6vD8n1h/giphy.gif">
                <button class="action-btn">SYNC</button>
            </div>
        </div>
    </div>

    <nav class="bottom-bar">
        <a href="#" class="nav-item"><span>🏠</span>HOME</a>
        <a href="#" class="nav-item"><span>🖼️</span>WALLPAPER</a>
        <a href="#" class="nav-item"><span>✨</span>STICKERS</a>
    </nav>

    <script>
        // Menu Toggle
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.style.left = menu.style.left === '0px' ? '-100%' : '0px';
        }

        // Loading Screen Logic
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 500);
            }, 3000); // Shows loading for 3 seconds
        };
    </script>
</body>
</html>
