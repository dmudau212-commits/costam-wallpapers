<div id="app-content" style="display: none;">
    <div class="icon-box"></div>
    <h1>Costam Wallz</h1>
    <p>Exclusive for Unicorn</p>

    <label for="file-upload" class="upload-btn">
        Upload to Sync
    </label>
    <input type="file" id="file-upload" accept="image/*,video/*" onchange="startSyncProcess(this)">
    
    <p id="status" style="margin-top: 20px; color: #ff00cc; min-height: 20px;"></p>
</div>

<script>
    // 1. LOADING & GREETING (Keep your existing welcome logic here)
    window.onload = function() {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                if (!localStorage.getItem('seenUnicorn')) {
                    alert("Hi!!! Unicorn");
                    localStorage.setItem('seenUnicorn', 'true');
                }
            }, 1000);
        }, 2500);
    };

    // 2. THE NEW "REAL SYNC" LOGIC
    function startSyncProcess(input) {
        if (input.files && input.files[0]) {
            const fileName = input.files[0].name;
            
            // Step 1: Ask where to apply
            const choice = prompt("Where do you want to apply this wallpaper?\n1. Home Screen\n2. Lock Screen\n3. Both");

            if (choice === "1" || choice === "2" || choice === "3") {
                document.getElementById('status').innerText = "Processing image...";
                
                // Simulate technical work
                setTimeout(() => {
                    document.getElementById('status').innerText = "Applying security layers...";
                    
                    setTimeout(() => {
                        document.getElementById('status').innerText = "Syncing to system...";
                        
                        setTimeout(() => {
                            alert("✅ SYNC SUCCESSFUL!\n\nFinal Step: Because of iPhone security, tap the 'Save' icon below the image to add it to your Photos, then set it as your wallpaper in Settings!");
                            document.getElementById('status').innerText = "Last sync: " + fileName;
                        }, 2000);
                    }, 2000);
                }, 1500);
            } else {
                alert("Sync cancelled. Please choose 1, 2, or 3.");
            }
        }
    }
</script>
