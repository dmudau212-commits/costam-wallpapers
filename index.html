<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>G-Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #4285F4; --bg: #ffffff; --text: #202124; --card-bg: #f8f9fa; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; overflow: hidden; }
        
        /* 1. CLEAN LOADING SCREEN */
        #loader {
            position: fixed; inset: 0; background: #fff; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .g-logo { font-size: 80px; font-weight: bold; font-family: 'Product Sans', sans-serif; }
        .blue { color: #4285F4; } .red { color: #EA4335; } .yellow { color: #FBBC05; } .green { color: #34A853; }

        /* 2. PLAY STORE SEARCH PILL */
        header { padding: 50px 16px 10px; background: #fff; }
        .search-pill {
            background: #f1f3f4; border-radius: 28px; padding: 12px 18px;
            display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .search-pill input {
            background: none; border: none; color: #3c4043; font-size: 16px; width: 100%; outline: none; margin-left: 10px;
        }
        .dots-btn { font-size: 24px; color: #5f6368; margin-left: 10px; cursor: pointer; }

        /* 3. APP CONTENT */
        .page { height: calc(100% - 145px); overflow-y: auto; display: none; padding: 0 16px 80px; }
        .page.active { display: block; }

        .section-title { font-size: 18px; font-weight: 500; margin: 20px 0 10px; color: #202124; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #dadce0; }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-info { padding: 10px; font-size: 12px; font-weight: 500; text-align: center; color: #5f6368; }

        /* 4. SIDE DRAWER */
        #side-drawer {
            position: fixed; top: 0; right: -100%; width: 80%; height: 100%;
            background: #fff; z-index: 10001; transition: 0.3s ease;
            padding: 60px 0; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .drawer-item { padding: 18px 24px; font-size: 16px; color: #3c4043; display: flex; align-items: center; cursor: pointer; }
        .drawer-item:active { background: #f1f3f4; }

        /* 5. SETTINGS: KEYBOARD/THEME COLOR */
        .color-row { display: flex; gap: 15px; margin-top: 15px; }
        .dot { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* 6. BOTTOM NAVIGATION */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: #fff; border-top: 1px solid #dadce0;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-link { text-align: center; font-size: 12px; color: #5f6368; text-decoration: none; display: flex; flex-direction: column; }
        .nav-link.active { color: var(--accent); font-weight: 500; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="g-logo">
            <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">l</span><span class="red">e</span>
        </div>
        <p style="margin-top: 20px; color: #5f6368; font-size: 14px;">Updating Vault...</p>
    </div>

    <div id="side-drawer">
        <div class="drawer-item" onclick="toggleMenu()" style="color: #999;">✕ Close</div>
        <div class="drawer-item">📂 My Files</div>
        <div class="drawer-item">📥 Downloads</div>
        <div class="drawer-item">⭐ Favorites</div>
    </div>

    <header>
        <div class="search-pill">
            <span style="color: #5f6368;">🔍</span>
            <input type="text" placeholder="Search apps & games">
        </div>
        <div class="dots-btn" onclick="toggleMenu()">⋮</div>
    </header>

    <div id="home" class="page active">
        <div class="section-title">Suggested for you</div>
        <div class="grid">
            <div class="card">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnVsdjYycTF0MnExNWh3OGRxYm14dXlyMWp5Z2R4Mzl5c3dqMGRoOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/WwK5pDffQ6l6vD8n1h/giphy.gif">
                <div class="card-info">SYNC IMAGE</div>
            </div>
            <div class="card">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjRreHByZ3A4bXF6ZXZqNnV4eHd4eHd4eHd4eHd4eHd4eHd4eHd4eHd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxx8y16D59S/giphy.gif">
                <div class="card-info">SYNC IMAGE</div>
            </div>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="section-title">App Theme</div>
        <p style="font-size: 14px; color: #5f6368;">Change keyboard & highlight color</p>
        <div class="color-row">
            <div class="dot" style="background:#4285F4" onclick="setTheme('#4285F4')"></div>
            <div class="dot" style="background:#34A853" onclick="setTheme('#34A853')"></div>
            <div class="dot" style="background:#EA4335" onclick="setTheme('#EA4335')"></div>
            <div class="dot" style="background:#FBBC05" onclick="setTheme('#FBBC05')"></div>
            <div class="dot" style="background:#000000" onclick="setTheme('#000000')"></div>
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="nav('home', this)">
            <span class="nav-icon">🎮</span>Games
        </div>
        <div class="nav-link">
            <span class="nav-icon">📱</span>Apps
        </div>
        <div class="nav-link" onclick="nav('settings', this)">
            <span class="nav-icon">⚙️</span>Settings
        </div>
    </nav>

    <script>
        function toggleMenu() {
            const drawer = document.getElementById('side-drawer');
            drawer.style.right = drawer.style.right === '0px' ? '-100%' : '0px';
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function setTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
            alert("Keyboard theme color updated!");
        }

        window.onload = () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);
        };
    </script>
</body>
</html>
